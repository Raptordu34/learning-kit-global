<!-- Exemple de slides à insérer dans le slides-container de index.html -->
<!-- section-EXAMPLE.html pour présentation : copier-coller dans index.html -->

<!-- Slide 1 : Titre -->
<div class="slide active">
    <div class="slide-content">
        <p class="slide-title">Titre de la Présentation</p>
        <p class="slide-subtitle">Sous-titre — Auteur — Date</p>
    </div>
</div>

<!-- Slide 2 : Plan -->
<div class="slide">
    <div class="slide-content">
        <h2>Plan</h2>
        <ul class="bullet-list">
            <li>Contexte et problématique</li>
            <li>Méthodologie</li>
            <li>Résultats</li>
            <li>Conclusion</li>
        </ul>
    </div>
</div>

<!-- Slide 3 : Contenu -->
<div class="slide">
    <div class="slide-content">
        <h2>Contexte</h2>
        <div class="slide-body">
            <p>Description du contexte...</p>
            <ul class="bullet-list">
                <li>Point <strong>important</strong></li>
                <li>Point avec <em>accent orange</em></li>
            </ul>
        </div>
        <span class="slide-number">3</span>
    </div>
</div>
